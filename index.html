<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset = "UTF-8">
        <meta name = "viewport"
        content="width=device-width,initial-scale=1.0">
        <title>Florza</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <nav>
            <h1>🛍️ Florza</h1>
            <button id="cartBtn">Cart (0)</button>
        </nav>

        <section class="hero">
            <h2>Everything You Love, All in One Place.</h2>
            <p>A Pleasant Shopping Experience</p>
            <button onclick="document.getElementById('productContainer').scrollIntoView({behavior:'smooth'})">Shop Now</button>
        </section>

        <section 
        class = "search-section">
        <input type="text" 
        id="searchInput"
        placeholder="Search products...">
        </section>

        <section class="categories">
            <button onclick="filterProducts('All')">All</button>
            <button onclick="filterProducts('Women')">Women</button>
            <button onclick="filterProducts('Men')">Men</button>
            <button onclick="filterProducts('Kids')">Kids</button>
            <button onclick="filterProducts('Pets')">Pets</button>
            <button onclick="filterProducts('Gadgets')">Gadgets</button>
            <button onclick="filterProducts('Grocery')">Grocery</button>
        </section>

        <section
        id="productContainer"></section>

        <section
        id="cartContainer">
                <h2>Your Cart</h2>
                <div id="cartItems"></div>
                <h3 id="totalPrice">Total: &#8377 0</h3>
                <button id="orderBtn">Place Order</button>
        </section>
        
        <footer>
            <p>&copy 2026 Florza. All Rights Reserved.</p>
        </footer>

        <script src="script.js"></script>
      
    </body>
</html>
